name: Download IoTDB Docker Image

on:
  workflow_dispatch:

jobs:
  pull-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Pull image
        run: |
          docker pull apache/iotdb:1.3.4

      - name: Save image
        run: |
          docker save apache/iotdb:1.3.4 -o iotdb-1.3.4.tar

      - name: Compress
        run: |
          gzip iotdb-1.3.4.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iotdb-1.3.4
          path: iotdb-1.3.4.tar.gz
